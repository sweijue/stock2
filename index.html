<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投資損益</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0f172a;
  color: white;
}
.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}
.card {
  background: #1e293b;
  padding: 16px;
  border-radius: 16px;
  margin-bottom: 16px;
}
input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}
button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  background: #3b82f6;
  color: white;
  border: none;
}
.big {
  font-size: 32px;
  text-align: center;
}
.green { color: #22c55e; }
.red { color: #ef4444; }
.gray { color: #94a3b8; }
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h3>輸入資料</h3>
    <input id="cost" placeholder="總投入（例如100000）">
    <input id="shares" placeholder="持股數（例如1000）">
    <input id="price" placeholder="目前股價（例如50）">
    <input id="cashback" placeholder="已收回（賣出+股利）">
    <button onclick="calc()">計算</button>
  </div>

  <div class="card">
    <div class="gray">現在全部賣掉</div>
    <div id="profit" class="big">--</div>
    <div id="rate" class="gray"></div>
  </div>

  <div class="card">
    <div class="gray">回本價格</div>
    <div id="breakeven" class="big">--</div>
    <div id="diff" class="gray"></div>
  </div>

  <div class="card">
    <div class="gray">如果現在買 / 賣會怎樣</div>
    <div id="simulate"></div>
  </div>

</div>

<script>
function calc() {
  const cost = +document.getElementById('cost').value || 0;
  const shares = +document.getElementById('shares').value || 0;
  const price = +document.getElementById('price').value || 0;
  const cashback = +document.getElementById('cashback').value || 0;

  const value = shares * price;
  const profit = value + cashback - cost;
  const rate = cost ? (profit / cost * 100).toFixed(2) : 0;

  // 顯示損益
  const p = document.getElementById('profit');
  const r = document.getElementById('rate');

  if (profit >= 0) {
    p.innerHTML = `+${profit.toFixed(0)}`;
    p.className = "big green";
    r.innerHTML = `+${rate}%`;
  } else {
    p.innerHTML = `${profit.toFixed(0)}`;
    p.className = "big red";
    r.innerHTML = `${rate}%`;
  }

  // 回本價格
  const breakeven = shares ? (cost - cashback) / shares : 0;
  document.getElementById('breakeven').innerHTML = breakeven.toFixed(2);

  const diff = price - breakeven;
  document.getElementById('diff').innerHTML =
    diff >= 0
      ? `高於回本 +${diff.toFixed(2)}`
      : `低於回本 ${diff.toFixed(2)}`;

  // 模擬（5%）
  const buyShares = Math.floor(shares * 0.05);
  const sellShares = Math.floor(shares * 0.05);

  const buyCost = buyShares * price;
  const newCost = cost + buyCost;
  const newShares = shares + buyShares;

  const buyProfit = newShares * price + cashback - newCost;

  const sellCash = sellShares * price;
  const sellProfit = (shares - sellShares) * price + cashback + sellCash - cost;

  document.getElementById('simulate').innerHTML = `
    買5%後：${buyProfit.toFixed(0)}<br>
    賣5%後：${sellProfit.toFixed(0)}
  `;
}
</script>

</body>
</html>
